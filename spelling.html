<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Spelling: Choose a Level</title>

	<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
	<link rel="stylesheet" href="./css/training.css">

	<style>
		.hub { max-width: 780px; width: 100%; }

		.tier { margin-bottom: 30px; }

		.tier-head {
			display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
		}
		.tier-icon {
			display: grid; place-items: center; width: 42px; height: 42px;
			border-radius: 12px; background: var(--primary-soft); color: var(--primary);
			font-size: 1.4rem; flex-shrink: 0;
		}
		.tier-head h2 { margin: 0; font-size: 1.15rem; font-weight: 700; border: none; padding: 0; }
		.tier-head .tier-blurb { margin: 2px 0 0; font-size: 0.85rem; color: var(--muted); }
		.tier-badge {
			margin-left: auto; font-size: 0.7rem; font-weight: 800; letter-spacing: 0.05em;
			text-transform: uppercase; color: var(--primary); background: var(--primary-soft);
			padding: 5px 11px; border-radius: 999px; white-space: nowrap;
		}

		.set-grid {
			display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px;
		}
		.set-card {
			display: flex; flex-direction: column; gap: 6px; padding: 18px 20px;
			border-radius: var(--radius); border: 1px solid var(--border); background: var(--card);
			box-shadow: var(--shadow-md); text-decoration: none; color: var(--text);
			transition: transform 0.12s ease, box-shadow 0.15s ease, border-color 0.15s ease;
		}
		.set-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
		.set-card h3 { margin: 0; font-size: 1.05rem; font-weight: 700; }
		.set-card p { margin: 0; color: var(--muted); font-size: 0.88rem; line-height: 1.45; }
		.set-card .meta-row {
			display: flex; align-items: center; justify-content: space-between; margin-top: 8px;
		}
		.set-card .count { font-size: 0.8rem; color: var(--muted); display: inline-flex; align-items: center; gap: 5px; }
		.set-card .go { font-weight: 700; font-size: 0.85rem; color: var(--primary); display: inline-flex; align-items: center; gap: 5px; }

		@media (max-width: 560px) {
			.tier-badge { display: none; }
		}
	</style>
</head>
<body>

<main class="hub">
	<div class="app-bar">
		<a class="brand" href="exercises.html">
			<span class="brand-mark"><i class="ph-bold ph-pencil-simple"></i></span>
			Spelling
		</a>
		<div class="header-actions">
			<a class="icon-btn" href="exercises.html" aria-label="All exercises" title="All exercises"><i class="ph-bold ph-squares-four"></i></a>
			<button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme"><i class="ph-bold ph-moon"></i></button>
		</div>
	</div>

	<header style="text-align:left; margin-bottom: 26px;">
		<h1>Spelling Practice</h1>
		<p class="subtitle">Choose a level to begin. Each set is a short mix of listening, unscrambling, fixing mistakes and choosing the right word. Start where you're comfortable and work your way up.</p>
	</header>

	<div id="tiers"></div>
</main>

<script src="./js/training-core.js"></script>
<script src="./js/spelling-sets.js"></script>
<script>
	(function () {
		const tiers = window.SPELLING_TIERS || [];
		const sets = window.SPELLING_SETS || {};
		const root = document.getElementById("tiers");

		root.innerHTML = tiers.map(tier => {
			const cards = tier.sets.map(key => {
				const set = sets[key];
				if (!set) return "";
				const count = set.questions.length;
				const title = set.meta.title || key;
				const subtitle = set.meta.subtitle || "";
				return `
					<a class="set-card" href="spelling-set.html?set=${encodeURIComponent(key)}">
						<h3>${title}</h3>
						<p>${subtitle}</p>
						<div class="meta-row">
							<span class="count"><i class="ph-bold ph-list-numbers"></i> ${count} questions</span>
							<span class="go">Start <i class="ph-bold ph-arrow-right"></i></span>
						</div>
					</a>`;
			}).join("");

			return `
				<section class="tier">
					<div class="tier-head">
						<span class="tier-icon"><i class="ph-bold ${tier.icon}"></i></span>
						<div>
							<h2>${tier.name}</h2>
							<p class="tier-blurb">${tier.blurb || ""}</p>
						</div>
						<span class="tier-badge">${tier.badge || ""}</span>
					</div>
					<div class="set-grid">${cards}</div>
				</section>`;
		}).join("");
	})();
</script>
</body>
</html>
